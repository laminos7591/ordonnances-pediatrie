<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordonnances Pédiatrie Intégral</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <header>
        <h1>Ordonnances en Pédiatrie</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Rechercher une pathologie, un mot clé, un traitement...">
        </div>
        <div class="filter-container" id="filter-tags">
            <button class="tag active" data-category="all">Tout</button>
        </div>
    </header>

    <main id="app-content">
        <div id="loading">Initialisation de l'application médicale...</div>
        <div id="cards-grid" class="cards-grid"></div>
    </main>

    <!-- Modal pour afficher l'ordonnance complète de façon lisible -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="modal-body-content"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
